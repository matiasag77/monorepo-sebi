version: "3.8"

services:
  # ─── Base de datos ───────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: sebi-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend BFF (NestJS) ────────────────────────────────────
  api-bff:
    build:
      context: ./api-bff-sebi
      dockerfile: Dockerfile
    container_name: sebi-api-bff
    restart: unless-stopped
    ports:
      - "${API_PORT:-3333}:3333"
    environment:
      PORT: 3333
      NODE_ENV: ${NODE_ENV:-development}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      MONGODB_URI: mongodb://mongodb:27017/sebi-chatbot
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-2h}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      BIGQUERY_PROJECT_ID: ${BIGQUERY_PROJECT_ID}
      BIGQUERY_KEY_FILE: ${BIGQUERY_KEY_FILE:-}
      BIGQUERY_DATASET: ${BIGQUERY_DATASET:-sebi_chatbot}
      BIGQUERY_TABLE: ${BIGQUERY_TABLE:-conversation_traces}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@sebi.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # ── ADK Cloud Run ──
      ADK_API_URL: ${ADK_API_URL}
    depends_on:
      mongodb:
        condition: service_healthy

  # ─── Frontend (Next.js) ──────────────────────────────────────
  frontend:
    build:
      context: ./front-sebi
      dockerfile: Dockerfile
    container_name: sebi-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3333/api}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      - api-bff

volumes:
  mongodb_data:
    driver: local
